<!DOCTYPE html>
<html lang="en">

<head>
    <script src="index.js" type="module"></script>
</head>

<body>
    <h1>Products:</h1>

    <ul name="products-list"></ul>

    <!-- confirmation message (REQUIRED for Cypress test) -->
    <p id="confirmation" style="display:none;">Product Created</p>

    <form name="product-creation">
        <label for="name">Name:</label>
        <input name="name" type="text" />

        <label for="price">Price:</label>
        <input name="price" type="number" step="0.01" />

        <label for="inventoryCount">Inventory:</label>
        <input name="inventoryCount" type="number" />

        <button type="submit">Create Product</button>
    </form>
</body>

</html>
