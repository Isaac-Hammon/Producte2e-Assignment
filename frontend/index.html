<!DOCTYPE html>
<html lang="en">

<head>
    <script src="index.js" type="module"></script>
</head>

<body>

    <!-- ================= AUTH BUTTONS ================= -->
    <div id="auth-buttons">
        <button id="login-btn" onclick="window.location.href='login.html'">
            Login
        </button>

        <button id="signup-btn" onclick="window.location.href='registration.html'">
            Sign Up
        </button>

        <button id="logout-btn" style="display:none;">
            Logout
        </button>
    </div>

    <!-- ================= WELCOME MESSAGE ================= -->
    <h2 id="welcome-message"></h2>

    <!-- ================= PRODUCTS ================= -->
    <h1>Products:</h1>

    <ul name="products-list"></ul>

    <!-- ================= CONFIRMATION ================= -->
    <p id="confirmation" style="display:none;"></p>

    <!-- ================= PRODUCT CREATION ================= -->
    <form name="product-creation">
        <label for="name">Name:</label>
        <input name="name" type="text" />

        <label for="price">Price:</label>
        <input name="price" type="number" step="0.01" />

        <label for="inventoryCount">Inventory:</label>
        <input name="inventoryCount" type="number" />

        <button type="submit">Create Product</button>
    </form>

    <hr />

    <!-- ================= RECEIPT ================= -->
    <div id="receipt" style="display:none; border:1px solid #ccc; padding:10px; margin-top:10px;"></div>

</body>

</html>
